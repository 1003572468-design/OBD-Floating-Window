name: Build APK

on:
  # 当推送到 main 分支时触发
  push:
    branches: [ main ]
  # 当创建 Pull Request 时触发
  pull_request:
    branches: [ main ]
  # 允许手动触发
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048M -Dorg.gradle.daemon=false"

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 设置 Gradle 缓存（加速构建）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. 赋予 gradlew 执行权限
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 5. 构建 Debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug

      # 6. 上传 APK 作为构建产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: obd-floating-window
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # 7. （可选）上传测试报告
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/
          retention-days: 7
